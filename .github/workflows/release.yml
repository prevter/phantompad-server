name: Build and Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.3), empty to skip publish'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, windows]

    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache CPM packages
        uses: actions/cache@v4
        with:
          path: ~/.cpm
          key: cpm-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-${{ matrix.os }}-

      - name: Configure
        shell: bash
        run: cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang
        env:
          CPM_SOURCE_CACHE: ~/.cpm

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload binary (Linux)
        if: matrix.os == 'ubuntu'
        uses: actions/upload-artifact@v7
        with:
          name: phantompad-linux
          path: build/phantompad
          if-no-files-found: error

      - name: Upload binary (Windows)
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: phantompad-windows
          path: build/phantompad.exe
          if-no-files-found: error

  installer:
    name: Build Installer
    runs-on: windows-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Windows binary
        uses: actions/download-artifact@v8
        with:
          name: phantompad-windows
          path: installer

      - name: Download ViGEmBus installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "installer/deps" -ErrorAction Ignore
          Invoke-WebRequest `
            "https://github.com/nefarius/ViGEmBus/releases/download/v1.22.0/ViGEmBus_1.22.0_x64_x86_arm64.exe" `
            -OutFile "installer/deps/ViGEmBus_1.22.0_x64_x86_arm64.exe"

      - name: Install NSIS + SimpleSC
        shell: pwsh
        run: |
          choco install nsis -y
          $pluginDir = "C:\Program Files (x86)\NSIS\Plugins\x86-unicode"
          Invoke-WebRequest "https://nsis.sourceforge.io/mediawiki/images/e/ef/NSIS_Simple_Service_Plugin_Unicode_1.30.zip" `
            -OutFile "$env:TEMP\SimpleSC.zip"
          Expand-Archive "$env:TEMP\SimpleSC.zip" -DestinationPath "$env:TEMP\SimpleSC"
          Copy-Item "$env:TEMP\SimpleSC\*.dll" $pluginDir

      - name: Build installer
        shell: pwsh
        run: |
          cd installer
          $version = "${{ github.event.inputs.version || github.ref_name }}".TrimStart("v")
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            /DAPP_VERSION=$version `
            installer.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: phantompad-installer
          path: installer/phantompad-*-setup.exe
          if-no-files-found: error
          archive: false

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [build, installer]
    if: github.event.inputs.version != '' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Resolve version tag
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/phantompad
            artifacts/phantompad.exe
            artifacts/phantompad-*-setup.exe